<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chroma Reactive Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; }
        canvas { display: block; }
        .ui-glass {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #bg-video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
        }
        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 4px;
            border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }
        /* Seekbar specific styling */
        #seekbar-ctrl::-webkit-slider-thumb {
            width: 12px;
            height: 12px;
            background: #60a5fa;
        }
    </style>
</head>
<body>

    <!-- Background Video Wrapper -->
    <div id="bg-video-container">
        <video id="bg-video" loop></video>
    </div>

    <!-- UI Overlay -->
    <div class="fixed inset-0 pointer-events-none z-10 flex flex-col justify-between p-8">
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="space-y-1">
                <h1 class="text-3xl font-black tracking-tighter text-white drop-shadow-lg">
                    CHROMA SYNC
                </h1>
                <p class="text-[9px] uppercase tracking-[0.4em] text-white/60 font-bold">Inversion Color Synthesis</p>
            </div>

            <div class="ui-glass p-6 rounded-3xl w-80 space-y-4 border-l-4 border-blue-500/50">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Select Media</label>
                    <input type="file" id="file-input" accept="video/*" 
                        class="text-[10px] text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-[10px] file:font-bold file:bg-white file:text-black hover:bg-white/10 cursor-pointer transition-all">
                </div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-6 pointer-events-auto">
            <div id="status-msg" class="text-[10px] font-bold text-white tracking-[0.5em] uppercase opacity-60">
                Ready to Sync
            </div>
            
            <div class="ui-glass px-10 py-6 rounded-[3rem] flex flex-col gap-4 shadow-2xl border-t border-white/5">
                <!-- Top Row: Audio & Visual Controls -->
                <div class="flex items-center gap-12">
                    <div class="space-y-3">
                        <div class="flex justify-between text-[9px] uppercase tracking-widest text-white/50 font-black">
                            <span>Intensity</span>
                            <span id="val-sens" class="text-white">4.0</span>
                        </div>
                        <input type="range" id="sens-ctrl" min="1.0" max="15.0" step="0.1" value="4.0" class="w-48">
                    </div>

                    <div class="w-[1px] h-12 bg-white/10"></div>

                    <div class="space-y-3">
                        <div class="flex justify-between text-[9px] uppercase tracking-widest text-white/50 font-black">
                            <span>Background Opacity</span>
                            <span id="val-bg-op" class="text-white">0.3</span>
                        </div>
                        <input type="range" id="bg-op-ctrl" min="0" max="1" step="0.05" value="0.3" class="w-48">
                    </div>

                    <div class="w-[1px] h-12 bg-white/10"></div>

                    <button id="play-btn" class="bg-white text-black text-[11px] font-black px-10 py-4 rounded-full hover:bg-gray-200 hover:scale-105 active:scale-95 transition-all disabled:opacity-10 shadow-lg shadow-white/5" disabled>
                        START SESSION
                    </button>
                </div>

                <!-- Bottom Row: Seekbar Control -->
                <div class="w-full flex items-center gap-4 pt-2 border-t border-white/5">
                    <span id="current-time" class="text-[10px] font-mono text-gray-400 w-10 text-right">0:00</span>
                    <input type="range" id="seekbar-ctrl" min="0" max="100" step="0.1" value="0" class="flex-grow">
                    <span id="duration-time" class="text-[10px] font-mono text-gray-400 w-10">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Canvas for color extraction -->
    <canvas id="color-thief-canvas" style="display:none;"></canvas>

    <script>
        let scene, camera, renderer, points, geometry;
        let audioCtx, analyser, dataArray, source;
        let isInitialized = false;
        
        const PARTICLE_COUNT = 15000; 
        const originalPositions = new Float32Array(PARTICLE_COUNT * 3);
        const currentVelocities = new Float32Array(PARTICLE_COUNT);
        const randomShuffles = new Int32Array(PARTICLE_COUNT);
        
        const video = document.getElementById('bg-video');
        const fileInput = document.getElementById('file-input');
        const sensCtrl = document.getElementById('sens-ctrl');
        const bgOpCtrl = document.getElementById('bg-op-ctrl');
        const playBtn = document.getElementById('play-btn');
        const statusMsg = document.getElementById('status-msg');
        
        // Seekbar elements
        const seekbar = document.getElementById('seekbar-ctrl');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationDisplay = document.getElementById('duration-time');
        
        // Color extraction tools
        const colorCanvas = document.getElementById('color-thief-canvas');
        const colorCtx = colorCanvas.getContext('2d', { willReadFrequently: true });
        let complementColor = new THREE.Color(0x00ffff);

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const colors = new Float32Array(PARTICLE_COUNT * 3);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;

                const r = 1.5;
                const x = r * Math.cos(theta) * Math.sin(phi);
                const y = r * Math.sin(theta) * Math.sin(phi);
                const z = r * Math.cos(phi);

                originalPositions[i3] = x;
                originalPositions[i3+1] = y;
                originalPositions[i3+2] = z;

                positions[i3] = x;
                positions[i3+1] = y;
                positions[i3+2] = z;

                randomShuffles[i] = Math.floor(Math.random() * 512);

                colors[i3] = 1;
                colors[i3+1] = 1;
                colors[i3+2] = 1;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.025,
                vertexColors: true,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function extractColor() {
            if (video.paused || video.ended || video.readyState < 2) return;
            
            try {
                colorCtx.drawImage(video, 0, 0, 10, 10);
                const data = colorCtx.getImageData(0, 0, 10, 10).data;
                
                let r = 0, g = 0, b = 0;
                for (let i = 0; i < data.length; i += 4) {
                    r += data[i];
                    g += data[i+1];
                    b += data[i+2];
                }
                const count = data.length / 4;
                r = (r / count) / 255;
                g = (g / count) / 255;
                b = (b / count) / 255;

                complementColor.setRGB(1.0 - r, 1.0 - g, 1.0 - b);
            } catch (error) {
                // Silent fail
            }
        }

        function setupAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 1024;
            analyser.smoothingTimeConstant = 0.8;
            
            source = audioCtx.createMediaElementSource(video);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isInitialized = true;
        }

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                video.src = url;
                playBtn.disabled = false;
                statusMsg.innerText = "STREAM SYNC READY";
                
                // Reset seekbar on new file load
                video.onloadedmetadata = () => {
                    seekbar.max = video.duration;
                    durationDisplay.innerText = formatTime(video.duration);
                    currentTimeDisplay.innerText = formatTime(0);
                    seekbar.value = 0;
                };
            }
        };

        playBtn.onclick = () => {
            if (!audioCtx) setupAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (video.paused) {
                video.play();
                statusMsg.innerText = "CHROMATIC SYNC ACTIVE";
            } else {
                video.pause();
                statusMsg.innerText = "PAUSED";
            }
        };

        // Seekbar interaction
        seekbar.oninput = () => {
            video.currentTime = seekbar.value;
            currentTimeDisplay.innerText = formatTime(video.currentTime);
        };

        video.ontimeupdate = () => {
            if (!video.paused) {
                seekbar.value = video.currentTime;
                currentTimeDisplay.innerText = formatTime(video.currentTime);
            }
        };

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const sensitivity = parseFloat(sensCtrl.value);
            const bgOpacity = parseFloat(bgOpCtrl.value);
            
            video.style.opacity = bgOpacity;
            document.getElementById('val-sens').innerText = sensitivity.toFixed(1);
            document.getElementById('val-bg-op').innerText = bgOpacity.toFixed(2);

            if (isInitialized && !video.paused) {
                analyser.getByteFrequencyData(dataArray);
                extractColor();
                
                const positions = geometry.attributes.position.array;
                const colors = geometry.attributes.color.array;

                const bassValue = (dataArray[2] + dataArray[3]) / 510;
                points.scale.setScalar(1 + (bassValue * 0.15 * sensitivity));

                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const i3 = i * 3;
                    const freqIdx = randomShuffles[i];
                    const targetFreqValue = (dataArray[freqIdx] / 255.0);
                    
                    currentVelocities[i] = currentVelocities[i] * 0.85 + targetFreqValue * 0.15;
                    const intensity = currentVelocities[i] * sensitivity;

                    const ox = originalPositions[i3];
                    const oy = originalPositions[i3+1];
                    const oz = originalPositions[i3+2];

                    const displacement = 1 + intensity * 0.5;
                    positions[i3] = ox * displacement;
                    positions[i3+1] = oy * displacement;
                    positions[i3+2] = oz * displacement;

                    colors[i3] = complementColor.r + (intensity * 0.3);
                    colors[i3+1] = complementColor.g + (intensity * 0.3);
                    colors[i3+2] = complementColor.b + (intensity * 0.3);
                }
                
                geometry.attributes.position.needsUpdate = true;
                geometry.attributes.color.needsUpdate = true;
                points.rotation.y += 0.003;
            } else {
                points.rotation.y += 0.001;
            }

            points.rotation.x += 0.0005;
            renderer.render(scene, camera);
        }

        window.onload = initScene;
    </script>
</body>
</html>
